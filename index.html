<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير التحويلات المالية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#ffffff;
    --bg2:#f1f5f9;
    --glass:#ffffff;
    --glass-border:#e2e8f0;
    --accent:#0284c7;
    --accent2:#7c3aed;
    --majid:#16a34a;
    --mohammed:#d97706;
    --text:#1e293b;
    --muted:#64748b;
    --success:#16a34a;
    --shadow: 0 4px 20px rgba(15,23,42,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Tajawal', sans-serif;
    background: radial-gradient(circle at 20% 10%, #f8fafc 0%, #eef2f7 55%, #e9edf3 100%);
    color:var(--text);
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .container{max-width:1400px; margin:0 auto;}
  header{
    text-align:center;
    padding:32px 20px 40px;
  }
  header h1{
    font-size:clamp(24px,4vw,38px);
    font-weight:900;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin-bottom:8px;
  }
  header p{color:var(--muted); font-size:15px;}

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(190px,1fr));
    gap:16px;
    margin-bottom:40px;
  }
  .stat-card{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:18px;
    padding:20px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    transition:transform .25s ease;
  }
  .stat-card:hover{transform:translateY(-4px);}
  .stat-card::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(56,189,248,0.08), rgba(167,139,250,0.05));
    pointer-events:none;
  }
  .stat-card .label{font-size:13px; color:var(--muted); margin-bottom:6px; position:relative;}
  .stat-card .value{font-size:24px; font-weight:700; position:relative;}
  .stat-card.money .value{color:var(--accent);}
  .stat-card.majid .value{color:var(--majid);}
  .stat-card.mohammed .value{color:var(--mohammed);}

  .section-title{
    font-size:22px;
    font-weight:700;
    margin:36px 0 18px;
    padding-right:14px;
    border-right:4px solid var(--accent);
  }

  .cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(340px,1fr));
    gap:20px;
  }
  .tx-card{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:20px;
    padding:22px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .tx-card .card-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    border-bottom:1px solid var(--glass-border);
    padding-bottom:12px;
  }
  .tx-card .card-head h3{font-size:17px; font-weight:700;}
  .badge{
    font-size:12px;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(56,189,248,0.15);
    color:var(--accent);
    border:1px solid rgba(56,189,248,0.3);
    white-space:nowrap;
  }
  .card-meta{display:flex; gap:18px; font-size:13px; color:var(--muted);}
  .card-meta b{color:var(--text); font-size:15px;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  thead th{
    text-align:right;
    padding:8px 6px;
    color:var(--muted);
    font-weight:500;
    cursor:pointer;
    user-select:none;
    border-bottom:1px solid var(--glass-border);
    white-space:nowrap;
  }
  thead th:hover{color:var(--accent);}
  thead th .arrow{font-size:10px; opacity:.6; margin-inline-start:4px;}
  tbody td{
    padding:7px 6px;
    border-bottom:1px solid rgba(15,23,42,0.06);
  }
  tbody tr:hover{background:rgba(2,132,199,0.05);}
  .empty-msg{color:var(--muted); font-size:14px; padding:14px 0; text-align:center;}
  .table-wrap{max-height:280px; overflow-y:auto;}
  .table-wrap::-webkit-scrollbar{width:6px;}
  .table-wrap::-webkit-scrollbar-thumb{background:rgba(15,23,42,0.15); border-radius:4px;}

  .summary-wrap{
    margin-top:44px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    border-radius:20px;
    padding:24px;
    box-shadow:var(--shadow);
    overflow-x:auto;
  }
  .summary-wrap table{min-width:600px;}
  .summary-wrap thead th{cursor:default; text-align:center; font-weight:700; color:var(--text);}
  .summary-wrap tbody td{text-align:center; padding:12px 8px;}
  .summary-wrap tbody tr:last-child{font-weight:700; background:rgba(56,189,248,0.07);}
  .summary-final{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
  }
  .summary-final .box{
    background:#f8fafc;
    border:1px solid var(--glass-border);
    border-radius:14px;
    padding:16px;
    text-align:center;
  }
  .summary-final .box .t{font-size:13px; color:var(--muted); margin-bottom:6px;}
  .summary-final .box .v{font-size:20px; font-weight:700; color:var(--accent);}
  .summary-final .box.total .v{color:var(--accent2); font-size:24px;}

  footer{
    text-align:center;
    margin-top:50px;
    color:var(--muted);
    font-size:12px;
  }

  @media print{
    body{background:#fff; color:#000;}
    .stat-card,.tx-card,.summary-wrap{
      background:#fff !important;
      border:1px solid #ccc !important;
      box-shadow:none !important;
      backdrop-filter:none !important;
    }
    .table-wrap{max-height:none; overflow:visible;}
    thead th{color:#000 !important;}
  }
</style>
</head>

/* =========================================================
   الإعدادات الثابتة
   ========================================================= */
const RECIPIENTS = ["ماجد حسين", "محمد ابو عيسى"];
const RECIPIENT_LABELS = {
  "ماجد حسين": "ماجد حسين",
  "محمد ابو عيسى": "محمد أبو عيسى"
};
const ACCOUNTS = ["جوال باي", "بال باي", "بنك فلسطين"];

/* =========================================================
   دوال تنسيق
   ========================================================= */
function formatCurrency(amount){
  return "₪" + amount.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:2});
}

/* =========================================================
   دوال الحسابات
   ========================================================= */
function filterByRecipientAccount(recipient, account){
  return rawTransactions.filter(t => t.recipient === recipient && t.account === account);
}
function sumAmount(list){
  return list.reduce((s,t) => s + t.amount, 0);
}
function totalByRecipient(recipient){
  return sumAmount(rawTransactions.filter(t => t.recipient === recipient));
}
function totalByAccount(account){
  return sumAmount(rawTransactions.filter(t => t.account === account));
}
function grandTotal(){
  return sumAmount(rawTransactions);
}

/* =========================================================
   بناء لوحة الإحصائيات
   ========================================================= */
function renderStats(){
  const stats = [
    { label:"إجمالي عدد العمليات", value: rawTransactions.length, cls:"" },
    { label:"إجمالي قيمة جميع التحويلات", value: formatCurrency(grandTotal()), cls:"money" },
    { label:"إجمالي ما استلمه ماجد حسين", value: formatCurrency(totalByRecipient("ماجد حسين")), cls:"majid" },
    { label:"إجمالي ما استلمه محمد أبو عيسى", value: formatCurrency(totalByRecipient("محمد ابو عيسى")), cls:"mohammed" },
    { label:"إجمالي عمليات جوال باي", value: formatCurrency(totalByAccount("جوال باي")), cls:"" },
    { label:"إجمالي عمليات بال باي", value: formatCurrency(totalByAccount("بال باي")), cls:"" },
    { label:"إجمالي عمليات بنك فلسطين", value: formatCurrency(totalByAccount("بنك فلسطين")), cls:"" }
  ];
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = stats.map(s => `
    <div class="stat-card ${s.cls}">
      <div class="label">${s.label}</div>
      <div class="value">${s.value}</div>
    </div>
  `).join('');
}

/* =========================================================
   الفرز
   ========================================================= */
function parseDate(d){
  const [day, month, year] = d.split('/').map(Number);
  return new Date(year, month-1, day).getTime();
}
function sortRows(rows, key, dir){
  const copy = [...rows];
  copy.sort((a,b) => {
    let va, vb;
    if(key === 'date'){ va = parseDate(a.date); vb = parseDate(b.date); }
    else if(key === 'amount'){ va = a.amount; vb = b.amount; }
    else { va = a.sender; vb = b.sender; }
    if(va < vb) return dir === 'asc' ? -1 : 1;
    if(va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  return copy;
}

/* =========================================================
   بناء البطاقات
   ========================================================= */
const cardState = {};

function cardId(recipient, account){
  return (recipient + "_" + account).replace(/\s+/g,'_');
}

function renderCardTable(recipient, account){
  const id = cardId(recipient, account);
  const state = cardState[id];
  const rows = sortRows(state.rows, state.sortKey, state.sortDir);
  const tbody = document.getElementById('tbody_' + id);
  if(rows.length === 0){
    tbody.parentElement.parentElement.querySelector('.table-area').innerHTML = '<div class="empty-msg">لا توجد عمليات.</div>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.sender}</td>
      <td>${formatCurrency(r.amount)}</td>
    </tr>
  `).join('');
}

function attachSortHandlers(recipient, account){
  const id = cardId(recipient, account);
  const ths = document.querySelectorAll(`#card_${id} thead th`);
  ths.forEach(th => {
    th.addEventListener('click', () => {
      const key = th.getAttribute('data-key');
      const state = cardState[id];
      if(state.sortKey === key){
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = key;
        state.sortDir = 'asc';
      }
      ths.forEach(t => t.querySelector('.arrow').textContent = '');
      th.querySelector('.arrow').textContent = state.sortDir === 'asc' ? '▲' : '▼';
      renderCardTable(recipient, account);
    });
  });
}

function renderCards(){
  const grid = document.getElementById('cardsGrid');
  let html = '';
  RECIPIENTS.forEach(recipient => {
    ACCOUNTS.forEach(account => {
      const rows = filterByRecipientAccount(recipient, account);
      const id = cardId(recipient, account);
      cardState[id] = { rows, sortKey:'date', sortDir:'asc' };
      const total = sumAmount(rows);
      html += `
        <div class="tx-card" id="card_${id}">
          <div class="card-head">
            <h3>${RECIPIENT_LABELS[recipient]} — ${account}</h3>
            <span class="badge">${rows.length} عملية</span>
          </div>
          <div class="card-meta">
            <span>عدد العمليات: <b>${rows.length}</b></span>
            <span>الإجمالي: <b>${formatCurrency(total)}</b></span>
          </div>
          <div class="table-area">
            ${rows.length === 0 ? '<div class="empty-msg">لا توجد عمليات.</div>' : `
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th data-key="date">التاريخ<span class="arrow"></span></th>
                    <th data-key="sender">اسم المحول<span class="arrow"></span></th>
                    <th data-key="amount">المبلغ<span class="arrow"></span></th>
                  </tr>
                </thead>
                <tbody id="tbody_${id}"></tbody>
              </table>
            </div>`}
          </div>
        </div>
      `;
    });
  });
  grid.innerHTML = html;

  RECIPIENTS.forEach(recipient => {
    ACCOUNTS.forEach(account => {
      const rows = filterByRecipientAccount(recipient, account);
      if(rows.length > 0){
        renderCardTable(recipient, account);
        attachSortHandlers(recipient, account);
        const id = cardId(recipient, account);
        const firstTh = document.querySelector(`#card_${id} thead th[data-key="date"] .arrow`);
        if(firstTh) firstTh.textContent = '▲';
      }
    });
  });
}

/* =========================================================
   بناء الملخص النهائي
   ========================================================= */
function renderSummary(){
  const body = document.getElementById('summaryBody');
  let rowsHtml = '';
  let grandJawwal = 0, grandBal = 0, grandBank = 0, grandAll = 0;

  RECIPIENTS.forEach(recipient => {
    const jawwal = sumAmount(filterByRecipientAccount(recipient, "جوال باي"));
    const bal = sumAmount(filterByRecipientAccount(recipient, "بال باي"));
    const bank = sumAmount(filterByRecipientAccount(recipient, "بنك فلسطين"));
    const total = jawwal + bal + bank;
    grandJawwal += jawwal;
    grandBal += bal;
    grandBank += bank;
    grandAll += total;
    rowsHtml += `
      <tr>
        <td>${RECIPIENT_LABELS[recipient]}</td>
        <td>${formatCurrency(jawwal)}</td>
        <td>${formatCurrency(bal)}</td>
        <td>${formatCurrency(bank)}</td>
        <td>${formatCurrency(total)}</td>
      </tr>
    `;
  });

  rowsHtml += `
    <tr>
      <td>الإجمالي العام</td>
      <td>${formatCurrency(grandJawwal)}</td>
      <td>${formatCurrency(grandBal)}</td>
      <td>${formatCurrency(grandBank)}</td>
      <td>${formatCurrency(grandAll)}</td>
    </tr>
  `;
  body.innerHTML = rowsHtml;

  const final = document.getElementById('summaryFinal');
  final.innerHTML = `
    <div class="box">
      <div class="t">إجمالي ما استلمه ماجد حسين</div>
      <div class="v">${formatCurrency(totalByRecipient("ماجد حسين"))}</div>
    </div>
    <div class="box">
      <div class="t">إجمالي ما استلمه محمد أبو عيسى</div>
      <div class="v">${formatCurrency(totalByRecipient("محمد ابو عيسى"))}</div>
    </div>
    <div class="box total">
      <div class="t">الإجمالي العام لجميع التحويلات</div>
      <div class="v">${formatCurrency(grandTotal())}</div>
    </div>
  `;
}

   التشغيل

renderStats();
